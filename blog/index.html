    <script>
        const SECRET_PARAM = "sumon2026tools";
        const SITE_URL = "https://toolshub.cam";

        let allPosts = [];
        let editingId = null;
        let postToDelete = null;
        let draftTimer = null;

        function isAdminMode() {
            return window.location.search.includes(SECRET_PARAM);
        }

        async function loadPosts() {
            try {
                const res = await fetch('posts.json?' + Date.now());
                allPosts = res.ok ? await res.json() : [];
            } catch (e) {
                console.warn("Failed to load posts.json");
                allPosts = [];
            }

            // Critical: Override OG meta tags for ?post=ID (runs early for crawlers)
            const urlParams = new URLSearchParams(window.location.search);
            const postIdStr = urlParams.get('post');
            if (postIdStr) {
                const postId = parseInt(postIdStr);
                const post = allPosts.find(p => p.id === postId);
                if (post) {
                    document.title = post.title + " | ToolsHub Blog";

                    const ogTitle = document.querySelector('meta[property="og:title"]');
                    const ogDesc = document.querySelector('meta[property="og:description"]');
                    const ogUrl = document.querySelector('meta[property="og:url"]');
                    const ogImage = document.querySelector('meta[property="og:image"]');
                    const ogType = document.querySelector('meta[property="og:type"]');

                    if (ogTitle) ogTitle.setAttribute("content", post.title);
                    if (ogDesc) ogDesc.setAttribute("content", post.excerpt || "Read this insightful article on ToolsHub");
                    if (ogUrl) ogUrl.setAttribute("content", `${SITE_URL}/blog?post=${post.id}`);
                    if (ogImage && post.image) ogImage.setAttribute("content", post.image);
                    if (ogType) ogType.setAttribute("content", "article");
                }
            }

            renderPosts();

            if (isAdminMode()) {
                document.getElementById('adminActions').style.display = 'flex';
            }
        }

        // The rest of your script (sharePost, renderPosts, viewPost, editor functions, etc.) remains exactly the same as your previous version.
        // Copy them from your current file and paste here.

        // Example of sharePost (unchanged):
        function sharePost(platform, id) {
            const post = allPosts.find(p => p.id === id);
            if (!post) return;
            const title = encodeURIComponent(post.title);
            const excerpt = encodeURIComponent(post.excerpt || "Read this article on ToolsHub");
            const postUrl = encodeURIComponent(`${SITE_URL}/blog?post=${post.id}`);

            let shareUrl = '';
            if (platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${title}&url=${postUrl}`;
            else if (platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${postUrl}`;
            else if (platform === 'linkedin') shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${postUrl}`;
            else if (platform === 'whatsapp') shareUrl = `https://wa.me/?text=${title}%20${postUrl}`;
            else if (platform === 'copy') {
                navigator.clipboard.writeText(`${SITE_URL}/blog?post=${post.id}`).then(() => showToast("✅ Link copied!"));
                return;
            }
            if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=500');
        }

        // ... (include all other functions: renderPosts, filterPosts, viewPost, closeReadModal, editor functions, etc.)

        document.addEventListener('DOMContentLoaded', () => {
            loadPosts();
            // Your existing theme, mobile, observer code here
        });
    </script>
